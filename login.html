<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.10);
      --card-border: rgba(255, 255, 255, 0.18);
      --text: #e2e8f0;
      --muted: rgba(226, 232, 240, 0.72);
      --accent: #38bdf8;
      --accent-2: #818cf8;
      --danger: #ef4444;
      --shadow: 0 18px 50px rgba(2, 6, 23, 0.38);
      --radius: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.2), transparent 28%),
        radial-gradient(circle at bottom right, rgba(129, 140, 248, 0.22), transparent 32%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-header {
      margin-bottom: 32px;
    }

    .login-header h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--muted);
      line-height: 1.5;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px 24px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      transition: 0.2s ease;
      margin-top: 10px;
    }

    .btn-google:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(56, 189, 248, 0.2);
    }

    .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .google-icon {
      width: 22px;
      height: 22px;
    }

    .error-message {
      display: none;
      color: var(--danger);
      font-size: 14px;
      margin-top: 16px;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 30px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Access your lesson guides securely with your Google Account.</p>
      </div>

      <button type="button" class="btn-google" id="loginBtn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="btnText">Log in using Google</span>
      </button>

      <div class="error-message" id="errorMessage"></div>
    </div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const errorContainer = document.getElementById('errorMessage');

    function showError(message) {
      errorContainer.textContent = message;
      errorContainer.classList.add('show');
    }

    // Auto-redirect if they already have a valid token
    window.addEventListener('load', function () {
      const token = localStorage.getItem('authToken');
      if (token) {
        // Appends ?page=app to the current Apps Script URL
        const url = new URL(window.location.href);
        url.searchParams.set('page', 'app');
        url.searchParams.set('token', token);
        window.location.href = url.toString();
      }
    });

    loginBtn.addEventListener('click', function () {
      errorContainer.classList.remove('show');
      loginBtn.disabled = true;
      btnText.textContent = 'Authenticating...';

      // Call the backend to verify Google Identity
      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || !result.success) {
            loginBtn.disabled = false;
            btnText.textContent = 'Log in using Google';
            showError(result && result.message ? result.message : 'Login failed.');
            return;
          }

          // Save token and redirect
          localStorage.setItem('authToken', result.token);
          
          const url = new URL(window.location.href);
          url.searchParams.set('page', 'app');
          url.searchParams.set('token', result.token);
          window.location.href = url.toString();
        })
        .withFailureHandler(function (error) {
          loginBtn.disabled = false;
          btnText.textContent = 'Log in using Google';
          showError(error.message || 'Server connection failed.');
        })
        .authenticateWithGoogle(); // Calls the Apps Script function
    });
  </script>
</body>
</html>
